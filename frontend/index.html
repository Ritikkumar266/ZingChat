<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZingChat - Realtime Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-container">
    <!-- Auth Screen -->
    <div id="authScreen" class="screen active">
      <div class="auth-box">
        <h1>ZingChat</h1>
        
        <!-- Login Form -->
        <div id="loginForm" class="auth-form active">
          <h2>Login</h2>
          <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
          <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
          <div style="text-align: center; margin-bottom: 15px;">
            <button type="button" id="togglePassword" style="background: none; border: none; cursor: pointer; font-size: 24px; padding: 5px 10px;">👁️</button>
          </div>
          <button id="loginBtn">Login</button>
          <p>Don't have an account? <a href="#" onclick="toggleAuthForm()">Sign up</a></p>
          <p style="text-align: center; margin-top: 10px;"><a href="#" onclick="showForgotPassword()" style="font-size: 12px; color: #667eea;">Forgot Password?</a></p>
        </div>

        <!-- Forgot Password Form -->
        <div id="forgotPasswordForm" class="auth-form">
          <h2>Reset Password</h2>
          <input type="email" id="forgotEmail" placeholder="Enter your email" autocomplete="email">
          <button id="sendResetBtn" style="background: #4caf50; margin-bottom: 10px;">Send Reset Link</button>
          <input type="text" id="resetOtpInput" placeholder="Enter OTP" style="display: none;">
          <button id="verifyResetOtpBtn" style="background: #2196F3; display: none; margin-bottom: 10px;">Verify OTP</button>
          <input type="password" id="newPasswordInput" placeholder="New Password" style="display: none;">
          <input type="password" id="confirmPasswordInput" placeholder="Confirm Password" style="display: none;">
          <button id="resetPasswordBtn" style="display: none;">Reset Password</button>
          <p><a href="#" onclick="backToLogin()" style="font-size: 12px; color: #667eea;">Back to Login</a></p>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-form">
          <h2>Sign Up</h2>
          <input type="email" id="registerEmail" placeholder="Email" autocomplete="email">
          <button id="sendOtpBtn" style="background: #4caf50; margin-bottom: 10px;">Send OTP</button>
          <input type="text" id="otpInput" placeholder="Enter OTP" style="display: none;">
          <button id="verifyOtpBtn" style="background: #2196F3; display: none; margin-bottom: 10px;">Verify OTP</button>
          <input type="text" id="registerUsername" placeholder="Username" autocomplete="username" style="display: none;">
          <input type="password" id="registerPassword" placeholder="Password" autocomplete="new-password" style="display: none;">
          <input type="password" id="registerConfirm" placeholder="Confirm Password" autocomplete="new-password" style="display: none;">
          <button id="registerBtn" style="display: none;">Sign Up</button>
          <p>Already have an account? <a href="#" onclick="toggleAuthForm()">Login</a></p>
        </div>

        <div id="authError" class="error-message"></div>
      </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="screen">
      <div class="chat-header">
        <div class="header-left">
          <h2>Chat Room</h2>
        </div>
        <div class="header-right">
          <button id="themeToggle" class="theme-btn" title="Toggle dark mode">🌙</button>
          <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
      </div>

      <div class="chat-main">
        <!-- Sidebar -->
        <div class="sidebar">
          <div class="sidebar-header">
            <h3>Conversations</h3>
          </div>
          <div id="conversationsList" class="users-list"></div>
          
          <div class="sidebar-header" style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 10px;">
            <h3>All Users</h3>
          </div>
          <div id="allUsersList" class="users-list"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
          <div id="noChatSelected" style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-light);">
            <p>Select a user to start chatting</p>
          </div>
          
          <div id="chatWindow" style="display: none; flex-direction: column; height: 100%;">
            <div class="chat-header" style="background: var(--bg-secondary); color: var(--text); border-bottom: 1px solid var(--border);">
              <h3 id="chatWithName" style="margin: 0;"></h3>
            </div>
            
            <div class="chat-content">
              <div id="messagesList" class="messages-list"></div>
              <div id="typingIndicator" class="typing-indicator"></div>
            </div>

            <div class="chat-footer">
              <div class="input-group">
                <input 
                  type="text" 
                  id="messageInput" 
                  placeholder="Type a message..." 
                  autocomplete="off"
                >
                <label for="fileInput" class="file-btn" title="Share file">📎</label>
                <input type="file" id="fileInput" style="display: none;">
                <button id="sendBtn">Send</button>
              </div>
              <div id="uploadProgress" class="upload-progress" style="display: none;">
                <div class="progress-bar"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Notification -->
  <div id="notification" class="notification"></div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
